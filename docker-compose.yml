services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      - redis
    expose:
      - "${PORT:-3000}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - web
    env_file:
      - ./.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
